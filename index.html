<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAEL MODEL EDITOR</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#111;
    color:white;
    font-family:sans-serif;
}

#ui{
    position:absolute;
    left:0;
    top:0;
    width:260px;
    height:100vh;
    overflow:auto;
    background:rgba(0,0,0,0.9);
    padding:10px;
    z-index:10;
}

button,select,input{
    width:100%;
    margin-top:8px;
    padding:8px;
    border:none;
    background:#222;
    color:white;
}

button{ background:#2d88ff; }

#cameraHelp{
    position:absolute;
    right:10px;
    bottom:10px;
    background:rgba(0,0,0,0.7);
    padding:8px;
    font-size:12px;
}
</style>
</head>

<body>

<div id="ui">

<h3>MODEL EDITOR</h3>

<select id="type">
<option value="box">BOX</option>
<option value="sphere">SPHERE</option>
<option value="cylinder">CYLINDER</option>
</select>

<button id="add">ADD PART</button>

<button id="newGroup">NEW GROUP</button>
<button id="endGroup">END GROUP</button>

<button id="dup">DUPLICATE</button>
<button id="save">SAVE</button>

<select id="list"></select>

<input type="color" id="color">

<h4>SIZE</h4>
<input id="sx" type="range" min="0.1" max="5" step="0.1" value="1">
<input id="sy" type="range" min="0.1" max="5" step="0.1" value="1">
<input id="sz" type="range" min="0.1" max="5" step="0.1" value="1">

</div>

<div id="cameraHelp">
DRAG = ROTATE<br>
WHEEL = ZOOM
</div>

<script type="module" src="./main.js"></script>

</body>
</html>
